<svg width="1180" height="610" viewBox="0 0 1180 610" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;family=Inter:wght@400;500;600;700&amp;display=swap');
      
      .text-fira { font-family: 'Fira Code', monospace; }
      .text-inter { font-family: 'Inter', sans-serif; }
      
      /* Typing Animation for Terminal Titles */
      @keyframes typing {
        0%, 100% { content: "Full-Stack Developer"; }
        25% { content: "QA Automation Specialist"; }
        50% { content: "AI & Vibe Coding Enthusiast"; }
        75% { content: "Cybersecurity Analyst"; }
      }
      
      .typing-text::after {
        content: "Full-Stack Developer";
        animation: typing 12s infinite;
      }
      
      /* Blinking Cursor */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor {
        animation: blink 1s infinite;
      }
      
      /* Floating effect for Left Side Portrait */
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-10px) rotate(1deg); }
      }
      .floating-group {
        animation: float 6s ease-in-out infinite;
      }
      
      /* Pulse glow for skills */
      @keyframes pulse {
        0%, 100% { filter: drop-shadow(0 0 2px rgba(37, 99, 235, 0.15)); }
        50% { filter: drop-shadow(0 0 8px rgba(37, 99, 235, 0.4)); }
      }
      .skill-pill {
        transition: all 0.3s ease;
      }
      .skill-pill:hover {
        filter: drop-shadow(0 0 10px #2563eb);
      }
      
      /* Background ambient animations */
      @keyframes ambient-glow {
        0%, 100% { transform: translate(0px, 0px) scale(1); }
        50% { transform: translate(40px, -60px) scale(1.1); }
      }
      .bg-glow-1 {
        animation: ambient-glow 10s ease-in-out infinite alternate;
      }
      
      @keyframes ambient-glow-2 {
        0%, 100% { transform: translate(0px, 0px) scale(1.1); }
        50% { transform: translate(-50px, 40px) scale(0.95); }
      }
      .bg-glow-2 {
        animation: ambient-glow-2 12s ease-in-out infinite alternate;
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1180" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#2563EB"/>
      <stop offset="0.5" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    
    <linearGradient id="terminal-border" x1="0" y1="0" x2="0" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="rgba(15, 23, 42, 0.08)"/>
      <stop offset="1" stop-color="rgba(15, 23, 42, 0.02)"/>
    </linearGradient>
    
    <linearGradient id="glow-grad-1" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </linearGradient>
    
    <linearGradient id="glow-grad-2" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
    </filter>
    
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="1180" height="610" fill="url(#bg-grad)"/>

  <!-- Ambient Glows -->
  <g filter="url(#blur-bg)" opacity="0.5">
    <circle class="bg-glow-1" cx="200" cy="150" r="180" fill="url(#glow-grad-1)"/>
    <circle class="bg-glow-2" cx="950" cy="450" r="220" fill="url(#glow-grad-2)"/>
  </g>

  <!-- ==================== LEFT SIDE: PORTRAIT / CYBER TERMINAL ==================== -->
  <g class="floating-group">
    <!-- Outer glass card -->
    <rect x="50" y="50" width="380" height="510" rx="20" fill="#f8fafc" fill-opacity="0.6" stroke="url(#terminal-border)" stroke-width="1.5"/>
    
    <!-- Code screen pattern -->
    <path d="M 50 150 L 430 150 M 50 250 L 430 250 M 50 350 L 430 350 M 50 450 L 430 450" stroke="rgba(15,23,42,0.02)" stroke-width="1"/>
    
    <!-- Cyber Face ASCII Art Outline -->
    <g transform="translate(140, 120)" opacity="0.8">
      <!-- Cybernetic / Digital Face Nodes -->
      <path d="M 50 20 L 150 20 L 170 80 L 150 240 L 50 240 L 30 80 Z" stroke="#2563EB" stroke-width="2" fill="none" opacity="0.25" filter="url(#glow-strong)"/>
      <path d="M 70 50 L 130 50 L 140 100 L 130 200 L 70 200 L 60 100 Z" stroke="#06B6D4" stroke-width="1.5" fill="none" opacity="0.3"/>
      
      <!-- Horizontal digital lines -->
      <line x1="30" y1="80" x2="170" y2="80" stroke="#10B981" stroke-width="1" opacity="0.4"/>
      <line x1="40" y1="120" x2="160" y2="120" stroke="#2563EB" stroke-width="1.5" opacity="0.5"/>
      
      <!-- Nodes / Vertices -->
      <circle cx="50" cy="20" r="4" fill="#2563EB" filter="url(#glow-strong)"/>
      <circle cx="150" cy="20" r="4" fill="#2563EB" filter="url(#glow-strong)"/>
      <circle cx="170" cy="80" r="4" fill="#10B981"/>
      <circle cx="30" cy="80" r="4" fill="#10B981"/>
      <circle cx="150" cy="240" r="4" fill="#06B6D4"/>
      <circle cx="50" cy="240" r="4" fill="#06B6D4"/>
      
      <!-- Cyber eye indicators -->
      <rect x="65" y="90" width="25" height="6" rx="2" fill="#2563EB"/>
      <rect x="110" y="90" width="25" height="6" rx="2" fill="#2563EB"/>
    </g>

    <!-- Terminal Prompt indicator on bottom left -->
    <text x="80" y="480" class="text-fira" fill="#10B981" font-size="14" font-weight="bold">raemishex@system</text>
    <text x="80" y="505" class="text-fira" fill="#64748b" font-size="13">~/portrait (active...)</text>
    <rect x="235" y="493" width="8" height="15" fill="#2563EB" class="cursor"/>
  </g>

  <!-- ==================== RIGHT SIDE: MAIN TERMINAL ==================== -->
  <g>
    <!-- Terminal shadow & main card -->
    <rect x="460" y="50" width="670" height="510" rx="16" fill="#f8fafc" fill-opacity="0.8" stroke="url(#terminal-border)" stroke-width="1.5"/>
    
    <!-- Terminal Header / Titlebar -->
    <path d="M 460 66 A 16 16 0 0 1 476 50 L 1114 50 A 16 16 0 0 1 1130 66 L 1130 90 L 460 90 Z" fill="#e2e8f0" fill-opacity="0.9"/>
    
    <!-- Window controls -->
    <circle cx="490" cy="70" r="6" fill="#ef4444"/>
    <circle cx="510" cy="70" r="6" fill="#eab308"/>
    <circle cx="530" cy="70" r="6" fill="#22c55e"/>
    
    <!-- Terminal Title -->
    <text x="795" y="75" class="text-fira" fill="#475569" font-size="13" text-anchor="middle">zsh — raemishex@github-profile</text>

    <!-- Terminal Content -->
    <!-- whoami section -->
    <text x="490" y="130" class="text-fira" fill="#10B981" font-size="15" font-weight="bold">$</text>
    <text x="510" y="130" class="text-fira" fill="#2563EB" font-size="15">whoami</text>
    
    <text x="490" y="165" class="text-inter" fill="#0f172a" font-size="24" font-weight="bold">Hi 👋 I'm Ramazan Huseynov (Raemishex)</text>
    
    <!-- Typing subtitle -->
    <text x="490" y="200" class="text-fira" fill="#2563EB" font-size="16" font-weight="bold">&gt;</text>
    <text x="510" y="200" class="text-fira typing-text" fill="#0d9488" font-size="16" font-weight="500"></text>
    <rect x="760" y="185" width="8" height="18" fill="#0d9488" class="cursor"/>

    <!-- Profile details -->
    <g transform="translate(490, 230)">
      <!-- Location -->
      <text x="0" y="0" class="text-fira" fill="#06B6D4" font-size="14" font-weight="bold">~/location</text>
      <text x="120" y="0" class="text-inter" fill="#334155" font-size="14">Baku, Azerbaijan</text>
      
      <!-- Focus -->
      <text x="0" y="30" class="text-fira" fill="#06B6D4" font-size="14" font-weight="bold">~/focus</text>
      <text x="120" y="30" class="text-inter" fill="#334155" font-size="14">AI Agent Workflow, Cyber Security &amp; Swarm Systems</text>
      
      <!-- GitHub -->
      <text x="0" y="60" class="text-fira" fill="#06B6D4" font-size="14" font-weight="bold">~/github</text>
      <text x="120" y="60" class="text-inter" fill="#2563EB" font-size="14">github.com/Raemishex</text>
      
      <!-- Email -->
      <text x="0" y="90" class="text-fira" fill="#06B6D4" font-size="14" font-weight="bold">~/email</text>
      <text x="120" y="90" class="text-inter" fill="#334155" font-size="14">huseyinovr686@gmail.com</text>
    </g>

    <!-- SKILLS SECTION -->
    <text x="490" y="370" class="text-fira" fill="#475569" font-size="13" font-weight="bold">SKILLS &amp; TECHNOLOGIES</text>
    
    <g transform="translate(490, 390)">
      <!-- Row 1 -->
      <g class="skill-pill" transform="translate(0, 0)">
        <rect width="90" height="28" rx="14" fill="#e2e8f0" stroke="rgba(15,23,42,0.04)" stroke-width="1"/>
        <text x="45" y="18" class="text-inter" fill="#2563EB" font-size="12" font-weight="500" text-anchor="middle">React</text>
      </g>
      
      <g class="skill-pill" transform="translate(100, 0)">
        <rect width="95" height="28" rx="14" fill="#e2e8f0" stroke="rgba(15,23,42,0.04)" stroke-width="1"/>
        <text x="47" y="18" class="text-inter" fill="#2563EB" font-size="12" font-weight="500" text-anchor="middle">TypeScript</text>
      </g>
      
      <g class="skill-pill" transform="translate(205, 0)">
        <rect width="90" height="28" rx="14" fill="#e2e8f0" stroke="rgba(15,23,42,0.04)" stroke-width="1"/>
        <text x="45" y="18" class="text-inter" fill="#2563EB" font-size="12" font-weight="500" text-anchor="middle">Node.js</text>
      </g>
      
      <g class="skill-pill" transform="translate(305, 0)">
        <rect width="100" height="28" rx="14" fill="#e2e8f0" stroke="rgba(15,23,42,0.04)" stroke-width="1"/>
        <text x="50" y="18" class="text-inter" fill="#2563EB" font-size="12" font-weight="500" text-anchor="middle">Tailwind CSS</text>
      </g>

      <g class="skill-pill" transform="translate(415, 0)">
        <rect width="80" height="28" rx="14" fill="#e2e8f0" stroke="rgba(15,23,42,0.04)" stroke-width="1"/>
        <text x="40" y="18" class="text-inter" fill="#2563EB" font-size="12" font-weight="500" text-anchor="middle">Python</text>
      </g>
      
      <!-- Row 2 -->
      <g class="skill-pill" transform="translate(0, 38)">
        <rect width="80" height="28" rx="14" fill="#e2e8f0" stroke="rgba(15,23,42,0.04)" stroke-width="1"/>
        <text x="40" y="18" class="text-inter" fill="#10B981" font-size="12" font-weight="500" text-anchor="middle">Docker</text>
      </g>
      
      <g class="skill-pill" transform="translate(90, 38)">
        <rect width="115" height="28" rx="14" fill="#e2e8f0" stroke="rgba(15,23,42,0.04)" stroke-width="1"/>
        <text x="57" y="18" class="text-inter" fill="#10B981" font-size="12" font-weight="500" text-anchor="middle">Threat Hunting</text>
      </g>
      
      <g class="skill-pill" transform="translate(215, 38)">
        <rect width="85" height="28" rx="14" fill="#e2e8f0" stroke="rgba(15,23,42,0.04)" stroke-width="1"/>
        <text x="42" y="18" class="text-inter" fill="#10B981" font-size="12" font-weight="500" text-anchor="middle">Git/Github</text>
      </g>
      
      <g class="skill-pill" transform="translate(310, 38)">
        <rect width="110" height="28" rx="14" fill="#e2e8f0" stroke="rgba(15,23,42,0.04)" stroke-width="1"/>
        <text x="55" y="18" class="text-inter" fill="#10B981" font-size="12" font-weight="500" text-anchor="middle">SQL Databases</text>
      </g>

      <g class="skill-pill" transform="translate(430, 38)">
        <rect width="90" height="28" rx="14" fill="#e2e8f0" stroke="rgba(15,23,42,0.04)" stroke-width="1"/>
        <text x="45" y="18" class="text-inter" fill="#10B981" font-size="12" font-weight="500" text-anchor="middle">Vibe Coding</text>
      </g>
    </g>

    <!-- Connect section / footer in terminal -->
    <text x="490" y="495" class="text-fira" fill="#10B981" font-size="14" font-weight="bold">$</text>
    <text x="510" y="495" class="text-fira" fill="#2563EB" font-size="14">connect --with</text>
    <text x="640" y="495" class="text-fira" fill="#0f172a" font-size="14">GitHub · LinkedIn · Email · X · Telegram</text>
    <rect x="940" y="482" width="8" height="15" fill="#0f172a" class="cursor"/>
  </g>
</svg>
