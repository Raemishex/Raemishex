<svg width="1180" height="610" viewBox="0 0 1180 610" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fonts -->
    <style>
      <![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap');
      
      .text-fira { font-family: 'Fira Code', monospace; }
      .text-inter { font-family: 'Inter', sans-serif; }
      
      /* Typing Animation */
      @keyframes typing {
        0%, 100% { content: "Full-Stack Developer"; }
        25% { content: "QA Automation Specialist"; }
        50% { content: "AI & Swarm Systems Architect"; }
        75% { content: "DevSecOps Analyst"; }
      }
      .typing-text::after {
        content: "Full-Stack Developer";
        animation: typing 12s infinite;
      }

      /* Blinking Cursor */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor { animation: blink 1s infinite; }

      /* Smooth 3D Floating & Hovering Animation */
      @keyframes float3d {
        0% { transform: translateY(0px) rotateX(10deg) rotateY(-14deg) rotateZ(3deg); }
        50% { transform: translateY(-16px) rotateX(8deg) rotateY(-12deg) rotateZ(2deg); }
        100% { transform: translateY(0px) rotateX(10deg) rotateY(-14deg) rotateZ(3deg); }
      }

      /* Liquid Glass Reflection Sweep */
      @keyframes glassSweep {
        0% { transform: translateX(-100%) translateY(-100%) rotate(25deg); opacity: 0; }
        20% { opacity: 0.3; }
        50% { opacity: 0.5; }
        80% { opacity: 0.3; }
        100% { transform: translateX(200%) translateY(200%) rotate(25deg); opacity: 0; }
      }

      /* Rotations for Liquid Glass Core */
      @keyframes rotateCoreOuter {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes rotateCoreInner {
        0% { transform: rotate(360deg); }
        100% { transform: rotate(0deg); }
      }

      .floating-glass-card {
        transform-style: preserve-3d;
        animation: float3d 7s ease-in-out infinite;
        transform-origin: 590px 305px;
      }

      .glass-sweep-light {
        animation: glassSweep 8s ease-in-out infinite;
      }

      .core-outer {
        transform-origin: 120px 110px;
        animation: rotateCoreOuter 20s linear infinite;
      }

      .core-inner {
        transform-origin: 120px 110px;
        animation: rotateCoreInner 14s linear infinite;
      }

      /* Liquid Shadow Pulse */
      @keyframes shadowPulse {
        0%, 100% { transform: scale(1) opacity(0.18); }
        50% { transform: scale(1.06) opacity(0.35); }
      }
      .shadow-pulse {
        animation: shadowPulse 7s ease-in-out infinite;
        transform-origin: 590px 525px;
      }

      /* Skill Tag Micro-interactions */
      .glass-tag {
        transition: all 0.3s ease;
      }
      .glass-tag:hover {
        fill: rgba(37, 99, 235, 0.08);
        stroke: #2563eb;
        filter: drop-shadow(0 0 8px rgba(37,99,235,0.3));
      }
      ]]>
    </style>

    <!-- Gradients & Liquid Glass Shaders -->
    <linearGradient id="pearl-bg" x1="0" y1="0" x2="1180" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>

    <!-- Liquid Metal Gradients -->
    <linearGradient id="liquid-platinum" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#0284c7" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#059669" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="glass-border" x1="0" y1="0" x2="900" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB" stop-opacity="0.4"/>
      <stop offset="0.3" stop-color="#0f172a" stop-opacity="0.08"/>
      <stop offset="0.7" stop-color="#0284c7" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0.3"/>
    </linearGradient>

    <linearGradient id="glass-surface" x1="0" y1="0" x2="900" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#f8fafc" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#f1f5f9" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="glass-reflection" x1="0" y1="0" x2="200" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="liquid-core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#0284c7" stop-opacity="0.4"/>
      <stop offset="80%" stop-color="#059669" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="ambient-blue" x1="0" y1="0" x2="500" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="glass-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
    </filter>
    
    <filter id="pearl-glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Pearl White Base Background -->
  <rect width="1180" height="610" fill="url(#pearl-bg)"/>

  <!-- Subtle Ambient Glows -->
  <g filter="url(#glass-blur)">
    <circle cx="280" cy="160" r="220" fill="url(#ambient-blue)"/>
  </g>

  <!-- Liquid Shadow Floor Projection -->
  <ellipse class="shadow-pulse" cx="590" cy="525" rx="380" ry="24" fill="#0f172a" opacity="0.2" filter="url(#glass-blur)"/>

  <!-- ==================== MAIN FLOATING LIQUID GLASS CARD ==================== -->
  <g class="floating-glass-card">
    <!-- Card Glass 3D Extrusion Shadow -->
    <rect x="142" y="82" width="896" height="446" rx="20" fill="#cbd5e1" opacity="0.6"/>

    <!-- Outer Liquid Glass Frame (Highlight border) -->
    <rect x="140" y="80" width="900" height="450" rx="20" fill="none" stroke="url(#glass-border)" stroke-width="1.5" opacity="0.8"/>

    <!-- Card Main Glass Surface -->
    <rect x="140" y="80" width="900" height="450" rx="20" fill="url(#glass-surface)" stroke="rgba(15,23,42,0.05)" stroke-width="1"/>

    <!-- Glass Header Titlebar -->
    <path d="M 140 100 A 20 20 0 0 1 160 80 L 1020 80 A 20 20 0 0 1 1040 100 L 1040 120 L 140 120 Z" fill="rgba(15,23,42,0.03)" stroke="rgba(15,23,42,0.04)" stroke-width="1"/>

    <!-- Refined Minimalist Window Dots -->
    <circle cx="170" cy="100" r="5" fill="#f43f5e" opacity="0.8"/>
    <circle cx="190" cy="100" r="5" fill="#fbbf24" opacity="0.8"/>
    <circle cx="210" cy="100" r="5" fill="#10b981" opacity="0.8"/>

    <!-- Terminal Breadcrumb Header -->
    <text x="590" y="104" class="text-fira" fill="#64748b" font-size="13" font-weight="500" text-anchor="middle">ramazan / ARCHITECTURAL_MAINFRAME</text>

    <!-- ==================== LEFT SIDE: LIQUID GLASS 3D CORE ==================== -->
    <g transform="translate(180, 155)">
      <!-- Inner Glass Frame for Hologram -->
      <rect width="240" height="300" rx="14" fill="rgba(241, 245, 249, 0.6)" stroke="rgba(15, 23, 42, 0.05)" stroke-width="1"/>

      <!-- Liquid Glass Core Center Spheres & Rings -->
      <g transform="translate(0, 5)">
        <!-- Outer Precision HUD Rings -->
        <circle cx="120" cy="115" r="85" stroke="rgba(37, 99, 235, 0.15)" stroke-width="1" stroke-dasharray="2 10" fill="none"/>
        <circle cx="120" cy="115" r="72" stroke="rgba(2, 132, 199, 0.2)" stroke-width="1" fill="none"/>

        <!-- Core Specular Glow Sphere -->
        <circle cx="120" cy="115" r="36" fill="url(#liquid-core-glow)"/>
        <circle cx="120" cy="115" r="14" fill="#2563EB" opacity="0.9"/>

        <!-- Outer Rotating Ring -->
        <g class="core-outer">
          <ellipse cx="120" cy="115" rx="72" ry="24" stroke="url(#liquid-platinum)" stroke-width="1.2" fill="none" opacity="0.8"/>
          <circle cx="192" cy="115" r="3" fill="#2563EB"/>
          <circle cx="48" cy="115" r="3" fill="#2563EB"/>
        </g>

        <!-- Inner Rotating Ring -->
        <g class="core-inner">
          <ellipse cx="120" cy="115" rx="24" ry="72" stroke="rgba(2, 132, 199, 0.8)" stroke-width="1.2" fill="none" opacity="0.7"/>
          <circle cx="120" cy="187" r="3" fill="#0284c7"/>
          <circle cx="120" cy="43" r="3" fill="#0284c7"/>
        </g>

        <!-- Laser Precision Sweep Line -->
        <line x1="35" y1="0" x2="205" y2="0" stroke="rgba(37, 99, 235, 0.6)" stroke-width="1.5">
          <animateTransform attributeName="transform" type="translate" values="0,30; 0,200; 0,30" dur="4.5s" repeatCount="indefinite"/>
        </line>
      </g>

      <!-- Label -->
      <text x="120" y="252" class="text-fira" fill="#2563EB" font-size="13" font-weight="700" letter-spacing="1" text-anchor="middle">LIQUID_CORE v4.0</text>
      <text x="120" y="275" class="text-fira" fill="#64748b" font-size="11" text-anchor="middle">refraction: 1.52 (active)</text>
    </g>

    <!-- ==================== RIGHT SIDE: CONTENT & SPECS ==================== -->
    <g transform="translate(465, 155)">
      <!-- Prompt -->
      <text x="0" y="20" class="text-fira" fill="#2563EB" font-size="15" font-weight="bold">$</text>
      <text x="20" y="20" class="text-fira" fill="#0f172a" font-size="15" font-weight="500">whoami</text>

      <!-- Main Name -->
      <text x="0" y="58" class="text-inter" fill="#0f172a" font-size="30" font-weight="800" letter-spacing="-0.02em">Ramazan Huseynov</text>

      <!-- Subtitle with Typing Animation -->
      <text x="0" y="94" class="text-fira" fill="#2563EB" font-size="16" font-weight="bold">&gt;</text>
      <text x="20" y="94" class="text-fira typing-text" fill="#0284c7" font-size="16" font-weight="500"></text>
      <rect x="290" y="78" width="8" height="20" fill="#0284c7" class="cursor"/>

      <!-- Architectural Specs -->
      <g transform="translate(0, 130)">
        <text x="0" y="0" class="text-fira" fill="#64748b" font-size="13" font-weight="600">~/focus</text>
        <text x="100" y="0" class="text-inter" fill="#334155" font-size="14" font-weight="500">Autonomous Aİ Swarm Systems &amp; 3D Graphics</text>

        <text x="0" y="32" class="text-fira" fill="#64748b" font-size="13" font-weight="600">~/github</text>
        <text x="100" y="32" class="text-inter" fill="#2563EB" font-size="14" font-weight="500">github.com/Raemishex</text>
      </g>

      <!-- SKILLS GRID (Liquid Glass Tags) -->
      <g transform="translate(0, 210)">
        <text x="0" y="0" class="text-fira" fill="#64748b" font-size="11" font-weight="700" letter-spacing="0.5">CORE TECHNOLOGIES</text>

        <!-- Row 1 -->
        <g transform="translate(0, 16)">
          <g class="glass-tag" transform="translate(0, 0)">
            <rect width="90" height="28" rx="8" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>
            <text x="45" y="18" class="text-inter" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">React/Next</text>
          </g>
          <g class="glass-tag" transform="translate(98, 0)">
            <rect width="92" height="28" rx="8" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>
            <text x="46" y="18" class="text-inter" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">TypeScript</text>
          </g>
          <g class="glass-tag" transform="translate(198, 0)">
            <rect width="88" height="28" rx="8" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>
            <text x="44" y="18" class="text-inter" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">Node.js</text>
          </g>
          <g class="glass-tag" transform="translate(294, 0)">
            <rect width="90" height="28" rx="8" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>
            <text x="45" y="18" class="text-inter" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">Tailwind</text>
          </g>
          <g class="glass-tag" transform="translate(392, 0)">
            <rect width="88" height="28" rx="8" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>
            <text x="44" y="18" class="text-inter" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">Python</text>
          </g>
        </g>

        <!-- Row 2 -->
        <g transform="translate(0, 52)">
          <g class="glass-tag" transform="translate(0, 0)">
            <rect width="88" height="28" rx="8" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>
            <text x="44" y="18" class="text-inter" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">Docker</text>
          </g>
          <g class="glass-tag" transform="translate(96, 0)">
            <rect width="112" height="28" rx="8" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>
            <text x="56" y="18" class="text-inter" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">DevSecOps</text>
          </g>
          <g class="glass-tag" transform="translate(216, 0)">
            <rect width="90" height="28" rx="8" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>
            <text x="45" y="18" class="text-inter" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">Git/Github</text>
          </g>
          <g class="glass-tag" transform="translate(314, 0)">
            <rect width="105" height="28" rx="8" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>
            <text x="52.5" y="18" class="text-inter" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">SQL Databases</text>
          </g>
          <g class="glass-tag" transform="translate(427, 0)">
            <rect width="55" height="28" rx="8" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)" stroke-width="1"/>
            <text x="27.5" y="18" class="text-inter" fill="#0f172a" font-size="12" font-weight="600" text-anchor="middle">3D</text>
          </g>
        </g>
      </g>

      <!-- Terminal Connect Footer -->
      <g transform="translate(0, 310)">
        <text x="0" y="18" class="text-fira" fill="#10b981" font-size="15" font-weight="bold">$</text>
        <text x="20" y="18" class="text-fira" fill="#0f172a" font-size="15" font-weight="500">connect --with</text>
        <text x="155" y="18" class="text-fira" fill="#64748b" font-size="15">GitHub · LinkedIn · Instagram</text>
        <rect x="420" y="4" width="8" height="16" fill="#2563eb" class="cursor"/>
      </g>
    </g>
  </g>
</svg>
