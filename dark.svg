<svg width="1180" height="610" viewBox="0 0 1180 610" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fonts -->
    <style>
      <![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap');
      
      .text-fira { font-family: 'Fira Code', monospace; }
      .text-inter { font-family: 'Inter', sans-serif; }
      
      /* Typing Animation */
      @keyframes typing {
        0%, 100% { content: "Full-Stack Developer"; }
        25% { content: "QA Automation Specialist"; }
        50% { content: "AI & Swarm Systems Architect"; }
        75% { content: "Cybersecurity Analyst"; }
      }
      .typing-text::after {
        content: "Full-Stack Developer";
        animation: typing 12s infinite;
      }

      /* Blinking Cursor */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .cursor { animation: blink 1s infinite; }

      /* Smooth 3D Floating/Hovering Animation */
      @keyframes float3d {
        0% { transform: translateY(0px) rotateX(12deg) rotateY(-18deg) rotateZ(5deg); }
        50% { transform: translateY(-15px) rotateX(10deg) rotateY(-15deg) rotateZ(3deg); }
        100% { transform: translateY(0px) rotateX(12deg) rotateY(-18deg) rotateZ(5deg); }
      }
      
      /* Orbital ring rotation for Holographic Core */
      @keyframes rotateRing1 {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes rotateRing2 {
        0% { transform: rotate(360deg); }
        100% { transform: rotate(0deg); }
      }

      .orbital-ring-1 {
        transform-origin: 120px 110px;
        animation: rotateRing1 15s linear infinite;
      }
      .orbital-ring-2 {
        transform-origin: 120px 110px;
        animation: rotateRing2 10s linear infinite;
      }

      /* Glowing shadow pulse under the 3D card */
      @keyframes shadowPulse {
        0%, 100% { transform: scale(1) opacity(0.4); }
        50% { transform: scale(1.08) opacity(0.65); }
      }

      .floating-3d-card {
        transform-style: preserve-3d;
        transform: rotateX(12deg) rotateY(-18deg) rotateZ(5deg);
        animation: float3d 6s ease-in-out infinite;
        transform-origin: 590px 305px;
      }

      .shadow-pulse {
        animation: shadowPulse 6s ease-in-out infinite;
        transform-origin: 590px 520px;
      }

      /* Ambient background glow shifting */
      @keyframes ambient-glow {
        0%, 100% { transform: translate(0px, 0px) scale(1); }
        50% { transform: translate(50px, -30px) scale(1.15); }
      }
      .bg-glow-1 { animation: ambient-glow 10s ease-in-out infinite alternate; }

      @keyframes ambient-glow-2 {
        0%, 100% { transform: translate(0px, 0px) scale(1.1); }
        50% { transform: translate(-60px, 50px) scale(0.9); }
      }
      .bg-glow-2 { animation: ambient-glow-2 12s ease-in-out infinite alternate; }

      /* Hover effects for skill tags */
      .skill-tag {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
      }
      .skill-tag:hover {
        fill: #22d3ee;
        filter: drop-shadow(0 0 8px #22d3ee);
      }
      ]]>
    </style>

    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1180" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030712"/>
      <stop offset="0.5" stop-color="#080e1e"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="neon-cyan-violet" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>

    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#7C3AED" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="card-border" x1="0" y1="0" x2="900" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0.6"/>
      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0.6"/>
    </linearGradient>

    <linearGradient id="card-bg" x1="0" y1="0" x2="900" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#090d16" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="glow-grad-1" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="glow-grad-2" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="50" result="blur"/>
    </filter>
    
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="25" stdDeviation="20" flood-color="#000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="1180" height="610" fill="url(#bg-grad)"/>

  <!-- Ambient Glows -->
  <g filter="url(#blur-bg)" opacity="0.65">
    <circle class="bg-glow-1" cx="250" cy="180" r="200" fill="url(#glow-grad-1)"/>
    <circle class="bg-glow-2" cx="930" cy="420" r="240" fill="url(#glow-grad-2)"/>
  </g>

  <!-- Noise and grid pattern overlay -->
  <rect width="1180" height="610" fill="none" opacity="0.04" stroke="#ffffff" stroke-width="1" stroke-dasharray="1 15"/>

  <!-- 3D Card Shadow Projection (Flats on base) -->
  <ellipse class="shadow-pulse" cx="590" cy="525" rx="360" ry="25" fill="#000000" opacity="0.6" filter="url(#blur-bg)"/>

  <!-- ==================== MAIN 3D FLOATING WORKSPACE ==================== -->
  <g class="floating-3d-card" style="perspective: 1200px;">
    <!-- 3D Card Extrusion Depth (Solid wall effect) -->
    <rect x="142" y="82" width="896" height="446" rx="24" fill="#020617" opacity="0.8" />
    
    <!-- Neon glowing outline (3D layer 1) -->
    <rect x="140" y="80" width="900" height="450" rx="24" fill="none" stroke="url(#card-border)" stroke-width="2.5" filter="url(#glow-strong)" opacity="0.75"/>
    
    <!-- Main Card Body (Glassmorphism layer 2) -->
    <rect x="140" y="80" width="900" height="450" rx="24" fill="url(#card-bg)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Terminal Titlebar Header -->
    <path d="M 140 104 A 24 24 0 0 1 164 80 L 1016 80 A 24 24 0 0 1 1040 104 L 1040 125 L 140 125 Z" fill="#090d16" fill-opacity="0.8"/>
    
    <!-- Window controls -->
    <circle cx="175" cy="102" r="7" fill="#ef4444"/>
    <circle cx="200" cy="102" r="7" fill="#eab308"/>
    <circle cx="225" cy="102" r="7" fill="#22c55e"/>
    
    <!-- Terminal Title -->
    <text x="590" y="107" class="text-fira" fill="#64748b" font-size="14" font-weight="500" text-anchor="middle">zsh — ramazan@swarm-mainframe</text>

    <!-- ==================== LEFT SIDE OF THE CARD: 3D CYBER CORE ==================== -->
    <g transform="translate(180, 160)">
      <!-- Matrix grid behind portrait -->
      <rect width="240" height="290" rx="16" fill="#020617" fill-opacity="0.4" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
      
      <!-- Futuristic 3D Cyber Core Sphere & Orbital Rings (NO COFFIN SHAPE!) -->
      <g transform="translate(0, 0)">
        <!-- Outer HUD Circle Frame -->
        <circle cx="120" cy="110" r="82" stroke="rgba(34, 211, 238, 0.25)" stroke-width="1.5" stroke-dasharray="4 8" fill="none"/>
        <circle cx="120" cy="110" r="70" stroke="rgba(124, 58, 237, 0.3)" stroke-width="1" fill="none"/>
        
        <!-- Glowing Core Center -->
        <circle cx="120" cy="110" r="32" fill="url(#core-glow)" filter="url(#glow-strong)"/>
        <circle cx="120" cy="110" r="16" fill="#22D3EE" opacity="0.9" filter="url(#glow-strong)"/>

        <!-- Orbital Ring 1 -->
        <g class="orbital-ring-1">
          <ellipse cx="120" cy="110" rx="68" ry="24" stroke="#22D3EE" stroke-width="1.5" fill="none" opacity="0.8" filter="url(#glow-strong)"/>
          <circle cx="188" cy="110" r="4" fill="#22D3EE"/>
          <circle cx="52" cy="110" r="4" fill="#22D3EE"/>
        </g>

        <!-- Orbital Ring 2 -->
        <g class="orbital-ring-2">
          <ellipse cx="120" cy="110" rx="24" ry="68" stroke="#7C3AED" stroke-width="1.5" fill="none" opacity="0.8" filter="url(#glow-strong)"/>
          <circle cx="120" cy="178" r="4" fill="#10B981"/>
          <circle cx="120" cy="42" r="4" fill="#10B981"/>
        </g>
        
        <!-- Animated Holographic Scanner Line -->
        <line x1="40" y1="0" x2="200" y2="0" stroke="#22D3EE" stroke-width="2" filter="url(#glow-strong)">
          <animateTransform attributeName="transform" type="translate" values="0,30; 0,190; 0,30" dur="4s" repeatCount="indefinite"/>
        </line>
      </g>

      <!-- Terminal title bottom -->
      <text x="120" y="240" class="text-fira" fill="#22D3EE" font-size="14" font-weight="bold" text-anchor="middle" filter="url(#glow-strong)">CYBER_CORE v3.0</text>
      <text x="120" y="265" class="text-fira" fill="#10B981" font-size="12" text-anchor="middle">status: online &amp; active</text>
    </g>

    <!-- ==================== RIGHT SIDE OF THE CARD: DETAILS ==================== -->
    <g transform="translate(465, 160)">
      <!-- Command prompt -->
      <text x="0" y="20" class="text-fira" fill="#10B981" font-size="16" font-weight="bold">$</text>
      <text x="20" y="20" class="text-fira" fill="#38bdf8" font-size="16">whoami</text>
      
      <!-- User name -->
      <text x="0" y="55" class="text-inter" fill="#f8fafc" font-size="28" font-weight="800">Ramazan Huseynov</text>
      
      <!-- Subtitle with Typing animation -->
      <text x="0" y="90" class="text-fira" fill="#38bdf8" font-size="17" font-weight="bold">&gt;</text>
      <text x="20" y="90" class="text-fira typing-text" fill="#a78bfa" font-size="17" font-weight="bold"></text>
      <rect x="290" y="74" width="8" height="20" fill="#a78bfa" class="cursor"/>

      <!-- Work Focus Details -->
      <g transform="translate(0, 125)">
        <text x="0" y="0" class="text-fira" fill="#64748b" font-size="14" font-weight="bold">~/profile</text>
        <text x="100" y="0" class="text-inter" fill="#e2e8f0" font-size="14" font-weight="500">Autonomous Aİ Swarm Architect &amp; DevSecOps Analyst</text>

        <text x="0" y="30" class="text-fira" fill="#64748b" font-size="14" font-weight="bold">~/github</text>
        <text x="100" y="30" class="text-inter" fill="#38bdf8" font-size="14" font-weight="500">github.com/Raemishex</text>
      </g>

      <!-- SKILLS GRID -->
      <g transform="translate(0, 205)">
        <text x="0" y="0" class="text-fira" fill="#64748b" font-size="12" font-weight="bold">SKILLS &amp; FRAMEWORKS</text>
        
        <!-- Row 1 of Skills -->
        <g transform="translate(0, 15)">
          <g class="skill-tag" transform="translate(0, 0)">
            <rect width="90" height="26" rx="13" fill="#1e293b" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
            <text x="45" y="17" class="text-inter" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">React/Next</text>
          </g>
          <g class="skill-tag" transform="translate(98, 0)">
            <rect width="90" height="26" rx="13" fill="#1e293b" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
            <text x="45" y="17" class="text-inter" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">TypeScript</text>
          </g>
          <g class="skill-tag" transform="translate(196, 0)">
            <rect width="90" height="26" rx="13" fill="#1e293b" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
            <text x="45" y="17" class="text-inter" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Node.js</text>
          </g>
          <g class="skill-tag" transform="translate(294, 0)">
            <rect width="90" height="26" rx="13" fill="#1e293b" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
            <text x="45" y="17" class="text-inter" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Tailwind</text>
          </g>
          <g class="skill-tag" transform="translate(392, 0)">
            <rect width="90" height="26" rx="13" fill="#1e293b" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
            <text x="45" y="17" class="text-inter" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Python</text>
          </g>
        </g>
        
        <!-- Row 2 of Skills -->
        <g transform="translate(0, 50)">
          <g class="skill-tag" transform="translate(0, 0)">
            <rect width="90" height="26" rx="13" fill="#1e293b" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
            <text x="45" y="17" class="text-inter" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Docker</text>
          </g>
          <g class="skill-tag" transform="translate(98, 0)">
            <rect width="110" height="26" rx="13" fill="#1e293b" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
            <text x="55" y="17" class="text-inter" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">DevSecOps</text>
          </g>
          <g class="skill-tag" transform="translate(216, 0)">
            <rect width="90" height="26" rx="13" fill="#1e293b" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
            <text x="45" y="17" class="text-inter" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">Git/Github</text>
          </g>
          <g class="skill-tag" transform="translate(314, 0)">
            <rect width="105" height="26" rx="13" fill="#1e293b" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
            <text x="52.5" y="17" class="text-inter" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">SQL Databases</text>
          </g>
          <g class="skill-tag" transform="translate(427, 0)">
            <rect width="55" height="26" rx="13" fill="#1e293b" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
            <text x="27.5" y="17" class="text-inter" fill="#f1f5f9" font-size="11" font-weight="600" text-anchor="middle">3D</text>
          </g>
        </g>
      </g>

      <!-- Terminal Connect block -->
      <g transform="translate(0, 305)">
        <text x="0" y="20" class="text-fira" fill="#10B981" font-size="15" font-weight="bold">$</text>
        <text x="20" y="20" class="text-fira" fill="#38bdf8" font-size="15">connect --with</text>
        <text x="155" y="20" class="text-fira" fill="#f8fafc" font-size="15">GitHub · LinkedIn · Instagram</text>
        <rect x="420" y="6" width="8" height="16" fill="#f8fafc" class="cursor"/>
      </g>
    </g>
  </g>
</svg>
